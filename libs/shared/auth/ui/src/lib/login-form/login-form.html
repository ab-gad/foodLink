<form [formGroup]="form" (ngSubmit)="login()">
  <hlm-field-group>
    <div class="flex flex-col items-center gap-1 text-center">
      <h1 class="text-2xl font-bold">Login to your account</h1>
      <p class="text-muted-foreground text-sm text-balance">
        Enter your email below to login to your account
      </p>
    </div>
    <hlm-field>
      <label hlmFieldLabel for="email">Email</label>
      <input
        hlmInput
        type="email"
        id="email"
        placeholder="m@example.com"
        formControlName="email"
      />
      <hlm-field-error validator="required">Email is required.</hlm-field-error>
      <hlm-field-error validator="email"
        >Enter a valid email address.</hlm-field-error
      >
    </hlm-field>
    <hlm-field>
      <div class="flex items-center">
        <label hlmFieldLabel for="password">Password</label>
        <a
          hlmFieldDescription
          class="ml-auto text-sm underline-offset-4 hover:underline"
          routerLink="."
        >
          Forgot password?
        </a>
      </div>
      <input
        hlmInput
        type="password"
        id="password"
        formControlName="password"
      />
      <hlm-field-error validator="required"
        >Password is required.</hlm-field-error
      >
      <hlm-field-error validator="minlength"
        >Password must be at least 8 characters long.</hlm-field-error
      >
    </hlm-field>
    <hlm-field>
      <button hlmBtn type="submit" [disabled]="form.invalid || isLoading()">
        Login
      </button>
    </hlm-field>
    <hlm-field-separator>Or you can register</hlm-field-separator>
    <hlm-field>
      <p hlmFieldDescription class="text-center">
        Don't have an account?
        <a routerLink=".">Sign up</a>
      </p>
    </hlm-field>
  </hlm-field-group>
</form>
